<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Exercise - Blog Preview</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Blog preview card -->
    <article class="blog-card">
        <!-- Blog post title -->
        <h1>Why I Love Web Development</h1>

        <!-- Publication date -->
        <p class="date">March 22, 2026</p>

        <!-- Article excerpt (preview text) -->
        <p class="excerpt">Web development is creative and logical at the same time. You can build anything you imagine!</p>

        <!-- Link to full article -->
        <a href="#" class="read-more">Read more</a>
    </article>
</body>
</html>
