<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Exercise - Profile Card</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Profile card container -->
    <article class="profile-card">
        <!-- Person's name -->
        <h1>Jane Developer</h1>

        <!-- Their job role -->
        <p class="role">Web Developer</p>

        <!-- A short bio about them -->
        <p class="bio">I love building websites and learning new things.</p>
    </article>
</body>
</html>
