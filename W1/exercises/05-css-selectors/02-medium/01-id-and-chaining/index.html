<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Exercise - ID Selectors & Chaining</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header with ID - should be styled uniquely -->
    <header id="main-header">
        <h1>My Website</h1>
    </header>

    <!-- Main content area -->
    <main>
        <p>Here are some buttons with different styles:</p>

        <!-- Regular button - just the base "btn" class -->
        <button class="btn">Regular</button>

        <!-- Large button - has BOTH "btn" and "large" classes -->
        <button class="btn large">Large</button>

        <!-- Primary button - has BOTH "btn" and "primary" classes -->
        <button class="btn primary">Primary</button>

        <!-- Large Primary button - has THREE classes! -->
        <button class="btn large primary">Large Primary</button>
    </main>

    <!-- Footer with ID - should be styled uniquely -->
    <footer id="footer">
        <p>Copyright 2026</p>
    </footer>
</body>
</html>
