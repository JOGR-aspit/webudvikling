<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Exercise - Element & Class Selectors</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main heading - all h1 elements should be styled -->
    <h1>Welcome</h1>

    <!-- Introduction paragraph with a class -->
    <p class="intro">This is the introduction. It sets up what the page is about.</p>

    <!-- Regular paragraph - no class -->
    <p>This is regular text. It has no special class.</p>

    <!-- Highlighted paragraph with a class -->
    <p class="highlight">This is highlighted. It stands out from other text.</p>

    <!-- Link with a class -->
    <a href="#" class="link">Click here</a>
</body>
</html>
