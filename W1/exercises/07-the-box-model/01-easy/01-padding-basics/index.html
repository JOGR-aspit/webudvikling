<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise: Padding Basics</title>

    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--
        INFO BOX
        This is the main container for our content.
        You will add padding to create space inside this box.
    -->
    <div class="info-box">

        <!--
            HEADING
            The title of our info box.
            You will add padding with different values for vertical and horizontal.
        -->
        <h2>Important Notice</h2>

        <!--
            PARAGRAPH
            The main content of the info box.
            You will add padding and a white background.
        -->
        <p>
            This is important information that needs to be easy to read.
            The padding you add will create space between the text and
            the edge of the paragraph's background area.
        </p>

    </div><!-- End of info-box -->

</body>
</html>
