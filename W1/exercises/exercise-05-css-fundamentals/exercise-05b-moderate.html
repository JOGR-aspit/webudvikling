<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Exercise 5b: CSS Fundamentals (Moderate Guidance)</title>

        <!-- TASK 4: Add internal CSS here -->
        <style>
            h1 {
                color: navy;
                font-size: 36px;
                text-align: center;
            }

            .subtitle {
                color: #666;
                font-size: 18px;
                text-align: center;
            }

            p {
                color: #333;
                font-size: 16px;
                line-height: 1.6;
            }

            .navigation {
                background-color: #f0f0f0;
                padding: 15px;
                text-align: center;
            }

            .nav-link {
                color: #333;
                text-decoration: none;
                margin: 0 15px;
                font-weight: bold;
            }

            .code-example {
                background-color: #f5f5f5;
                padding: 15px;
                font-family: monospace;
            }
        </style>
    </head>

    <body>
        <!-- TASK 1: Add HTML comment -->
        <h1 class="page-title">Welcome to CSS Fundamentals</h1>
        <p class="subtitle">Learning to style webpages with CSS</p>

        <!-- TASK 2: Create HTML structure -->
        <!-- TASK 3: Add inline CSS to heading -->
        <h2 style="color: blue; font-size: 28px; text-align: center;">
            This heading uses inline CSS
        </h2>

        <p>
            Inline CSS is added directly to HTML elements using the style attribute.
        </p>

        <!-- TASK 5: Style paragraph with internal CSS -->
        <p class="styled-paragraph">
            This paragraph is styled using internal CSS. Check the <style> tag
            in the <head> section to see how it's styled.
        </p>

        <p>
            Internal CSS keeps styles separate from content in the same file.
        </p>

        <!-- TASK 6/7: Navigation and external CSS reference -->
        <nav class="navigation">
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">About</a>
            <a href="#" class="nav-link">Blog</a>
            <a href="#" class="nav-link">Contact</a>
        </nav>

        <hr>

        <p><strong>External CSS</strong> is the best practice:</p>
        <p class="code-example">
            &lt;link rel="stylesheet" href="styles.css"&gt;
        </p>

        <p>
            External CSS makes styles reusable across pages and easier to maintain.
        </p>

        <!-- =======================================================
             EXERCISE COMPLETE!
        ======================================================= -->
    </body>
</html>
